<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claw Machine</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #fdf3ee;
  --pink1:  #fff0f5;
  --pink2:  #f5d5e4;
  --pink3:  #ecaec6;
  --pink4:  #de7a98;
  --tan1:   #f2e6da;
  --tan2:   #d9c5b5;
  --tan3:   #b5a095;
  --brown:  #5c4450;
  --muted:  #9c8090;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: Georgia, 'Times New Roman', serif;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── PAGE TITLE ── */
.page-title {
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 9px 0 5px;
}

/* ── MACHINE WRAP ── */
.machine-wrap { width: min(340px, 96vw); }

.machine {
  width: 100%;
  background: linear-gradient(160deg, var(--pink1) 0%, var(--tan1) 100%);
  border: 2.5px solid var(--tan2);
  border-radius: 18px 18px 6px 6px;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    0 14px 48px rgba(180,100,140,.16),
    0 3px 10px rgba(180,100,140,.10);
}

/* ── NAMEPLATE ── */
.nameplate {
  background: linear-gradient(to bottom, var(--tan2), var(--tan1));
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 14px;
  border-bottom: 2px solid var(--pink2);
}

.nameplate-text {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--brown);
  text-transform: uppercase;
}

.lights { display: flex; gap: 6px; }
.light {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pink3);
  animation: blink 1.7s ease-in-out infinite;
}
.light:nth-child(2) { animation-delay: .56s; background: var(--tan2); }
.light:nth-child(3) { animation-delay: 1.1s; }

@keyframes blink {
  0%,100% { opacity:1; }
  50%      { opacity:.25; }
}

/* ── RAIL ── */
.rail-track {
  height: 20px;
  background: linear-gradient(to bottom, var(--tan3), var(--tan2));
  position: relative;
}

.rail-groove {
  position: absolute;
  top: 7px; left: 14px; right: 14px;
  height: 5px;
  background: rgba(0,0,0,.08);
  border-radius: 3px;
}

.rail-cart {
  position: absolute;
  top: 2px;
  width: 28px; height: 16px;
  background: linear-gradient(to bottom, #fff, var(--tan1));
  border: 1.5px solid var(--tan2);
  border-radius: 5px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 2px 5px rgba(0,0,0,.09);
  transition: left .06s linear;
}

.rail-cart.idle {
  animation: idleSwing 2.9s ease-in-out infinite;
}

/* ── GLASS / PLAY AREA ── */
.glass {
  height: 312px;
  background: linear-gradient(170deg, rgba(255,248,252,.72) 0%, rgba(255,232,242,.45) 100%);
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--pink2);
}

/* Shine */
.glass::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(255,255,255,.14) 0%, transparent 38%);
  pointer-events: none;
  z-index: 30;
}

/* ── CLAW ASSEMBLY ── */
.claw-assy {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
}

.claw-assy.idle {
  animation: idleSwing 2.9s ease-in-out infinite;
}

@keyframes idleSwing {
  0%,100% { left: 27%; }
  50%      { left: 73%; }
}

/* Wire */
.wire {
  width: 2px;
  height: 72px;
  background: linear-gradient(to bottom, var(--tan3), var(--pink3));
}

/* Claw head */
.claw-head {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.claw-bar {
  width: 46px; height: 9px;
  background: linear-gradient(to bottom, var(--tan3), var(--tan2));
  border-radius: 4.5px;
  box-shadow: 0 2px 5px rgba(0,0,0,.13);
}

.claw-prongs {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  margin-top: 1px;
}

.prong {
  width: 5px;
  background: linear-gradient(to bottom, var(--tan2), var(--pink4));
  border-radius: 0 0 4px 4px;
  transform-origin: top center;
  transition: transform .28s ease;
  box-shadow: 0 2px 4px rgba(0,0,0,.09);
}

.prong.l { height: 26px; transform: rotate(-18deg); }
.prong.c { height: 32px; }
.prong.r { height: 26px; transform: rotate(18deg); }

/* Grabbing — prongs close in */
.claw-head.grabbing .prong.l { transform: rotate(-3deg); }
.claw-head.grabbing .prong.r { transform: rotate(3deg); }

/* Held prize (flies up with claw) */
.held-prize {
  position: absolute;
  font-size: 22px;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 5;
  display: none;
}

/* ── SHELF / FLOOR LINE ── */
.shelf-line {
  position: absolute;
  bottom: 108px;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--pink2) 20%, var(--pink2) 80%, transparent);
}

/* ── PRIZE ROW ── */
.prize-row {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 108px;
  display: flex;
  align-items: flex-end;
  justify-content: space-evenly;
  padding: 0 6px 7px;
  background: linear-gradient(to top, rgba(248,208,224,.55), transparent);
}

.prize {
  flex: 1;
  max-width: 56px;
  height: 93px;
  background: white;
  border: 1.5px solid var(--pink2);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px 2px 5px;
  text-align: center;
  box-shadow: 0 2px 10px rgba(180,100,140,.09);
  transition: transform .45s ease, opacity .45s ease;
  position: relative;
  overflow: hidden;
}

.prize-icon { font-size: 26px; line-height: 1; margin-bottom: 4px; }

.prize-name {
  font-size: 7.5px;
  color: var(--muted);
  line-height: 1.25;
  font-family: Georgia, serif;
}

/* Rubik's face */
.rubiks {
  width: 30px; height: 30px;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 1.5px;
  background: #2a2a2a;
  border: 1.5px solid #2a2a2a;
  border-radius: 3px;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.rc { border-radius: 1.5px; }

/* Stare eyes */
.stare {
  display: flex;
  gap: 5px;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.eye {
  width: 16px; height: 20px;
  background: white;
  border: 1.5px solid #444;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.iris {
  width: 9px; height: 9px;
  background: #2c4a7a;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pupil {
  width: 5px; height: 5px;
  background: #111;
  border-radius: 50%;
}

/* Mystery prize */
.mystery-box {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #2a2a2a, #444);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-bottom: 4px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
  animation: mysteryPulse 2.2s ease-in-out infinite;
}
@keyframes mysteryPulse {
  0%,100% { box-shadow: 0 2px 6px rgba(0,0,0,.3); }
  50%      { box-shadow: 0 2px 14px rgba(200,100,160,.55); }
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 0 6px;
}

.timer {
  font-size: 36px;
  font-weight: bold;
  color: var(--pink4);
  letter-spacing: 2px;
  height: 44px;
  line-height: 44px;
  min-width: 90px;
  text-align: center;
}
.timer.urgent {
  color: #d03030;
  animation: urgentPulse .45s ease-in-out infinite alternate;
}
@keyframes urgentPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.07); }
}

.drop-btn {
  width: 152px; height: 54px;
  background: linear-gradient(180deg, #f8becc, #e07a96);
  border: none;
  border-radius: 27px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 5px;
  cursor: pointer;
  font-family: Georgia, serif;
  box-shadow: 0 5px 0 #b85870, 0 9px 22px rgba(220,100,140,.35);
  transition: transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color: transparent;
}
.drop-btn:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #b85870, 0 4px 10px rgba(220,100,140,.22);
}
.drop-btn:disabled {
  background: linear-gradient(180deg, #ddd0d8, #c0b0bc);
  box-shadow: 0 5px 0 #9a8895, 0 9px 22px rgba(0,0,0,.07);
  cursor: not-allowed;
}

/* ── START OVERLAY ── */
#startOverlay {
  position: fixed; inset: 0;
  background: rgba(253,243,238,.94);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
#startOverlay h2 {
  font-size: 28px;
  color: var(--brown);
  letter-spacing: 6px;
  text-transform: uppercase;
  font-weight: normal;
  margin-bottom: 12px;
}
#startOverlay p {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  line-height: 1.75;
  max-width: 260px;
  margin-bottom: 28px;
}
.start-btn {
  width: 180px; height: 56px;
  background: linear-gradient(180deg, #f8becc, #e07a96);
  border: none;
  border-radius: 28px;
  color: white;
  font-size: 16px;
  letter-spacing: 4px;
  cursor: pointer;
  font-family: Georgia, serif;
  box-shadow: 0 5px 0 #b85870, 0 8px 24px rgba(220,100,140,.38);
  -webkit-tap-highlight-color: transparent;
}

/* ── WIN SCREEN ── */
#winScreen {
  position: fixed; inset: 0;
  background: rgba(253,243,238,.96);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  text-align: center;
  padding: 20px;
}
#winScreen.show { display: flex; }

.win-icon { font-size: 70px; margin-bottom: 12px; }
.win-title {
  font-size: 22px;
  letter-spacing: 5px;
  color: var(--brown);
  text-transform: uppercase;
  font-weight: normal;
  margin-bottom: 8px;
}
.win-sub {
  font-size: 14px;
  color: var(--muted);
  max-width: 280px;
  line-height: 1.6;
  white-space: pre-line;
  margin-bottom: 22px;
}
.mystery-link {
  display: none;
  margin-bottom: 16px;
  text-decoration: none;
}
.mystery-link-btn {
  width: 200px; height: 46px;
  background: linear-gradient(180deg, #2a2a2a, #444);
  border: none;
  border-radius: 23px;
  color: white;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: Georgia, serif;
}
.again-btn {
  width: 160px; height: 50px;
  background: linear-gradient(180deg, #f8becc, #e07a96);
  border: none;
  border-radius: 25px;
  color: white;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
  font-family: Georgia, serif;
  box-shadow: 0 4px 0 #b85870, 0 6px 18px rgba(220,100,140,.32);
}

/* ── CONFETTI ── */
.cft {
  position: fixed;
  border-radius: 2px;
  animation: cftFall linear forwards;
  pointer-events: none;
  z-index: 400;
}
@keyframes cftFall {
  from { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  to   { transform: translateY(110vh) rotate(800deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- ── START OVERLAY ── -->
<div id="startOverlay">
  <h2>Claw Machine</h2>
  <p>Tilt your phone to aim the claw.<br>You have <strong>30 seconds</strong> to grab a prize!</p>
  <button class="start-btn" id="startBtn">START</button>
</div>

<!-- ── WIN SCREEN ── -->
<div id="winScreen">
  <div class="win-icon" id="winIcon">🎉</div>
  <div class="win-title">You Win!</div>
  <div class="win-sub" id="winSub"></div>
  <a href="https://youtu.be/Aq5WXmQQooo?si=y6cVUeT25OzcfSiZ" target="_blank"
     rel="noopener noreferrer" class="mystery-link" id="mysteryLink">
    <button class="mystery-link-btn">🎬 Reveal Mystery Prize</button>
  </a>
  <button class="again-btn" onclick="resetGame()">PLAY AGAIN</button>
</div>

<!-- ── PAGE TITLE ── -->
<div class="page-title">✦ Prize Claw ✦</div>

<!-- ── MACHINE ── -->
<div class="machine-wrap">
<div class="machine">

  <!-- Nameplate -->
  <div class="nameplate">
    <div class="nameplate-text">Claw Machine</div>
    <div class="lights">
      <div class="light"></div>
      <div class="light"></div>
      <div class="light"></div>
    </div>
  </div>

  <!-- Rail -->
  <div class="rail-track">
    <div class="rail-groove"></div>
    <div class="rail-cart idle" id="railCart"></div>
  </div>

  <!-- Glass / play area -->
  <div class="glass" id="glass">

    <!-- Claw -->
    <div class="claw-assy idle" id="clawAssy">
      <div class="wire" id="wire"></div>
      <div class="claw-head" id="clawHead">
        <div class="claw-bar"></div>
        <div class="claw-prongs">
          <div class="prong l"></div>
          <div class="prong c"></div>
          <div class="prong r"></div>
        </div>
        <div class="held-prize" id="heldPrize"></div>
      </div>
    </div>

    <!-- Shelf line -->
    <div class="shelf-line"></div>

    <!-- Prizes -->
    <div class="prize-row" id="prizeRow">

      <!-- 0: Rubik's Cube -->
      <div class="prize" id="p0">
        <div class="rubiks">
          <div class="rc" style="background:#e74c3c"></div>
          <div class="rc" style="background:#3498db"></div>
          <div class="rc" style="background:#2ecc71"></div>
          <div class="rc" style="background:#f1c40f"></div>
          <div class="rc" style="background:#fff"></div>
          <div class="rc" style="background:#e67e22"></div>
          <div class="rc" style="background:#3498db"></div>
          <div class="rc" style="background:#9b59b6"></div>
          <div class="rc" style="background:#e74c3c"></div>
        </div>
        <div class="prize-name">Magnetic Speed Cube + Lube</div>
      </div>

      <!-- 1: Banksy Tickets -->
      <div class="prize" id="p1">
        <div class="prize-icon">🎫</div>
        <div class="prize-name">Banksy Tickets</div>
      </div>

      <!-- 2: RaRaRamen -->
      <div class="prize" id="p2">
        <div class="prize-icon">🍜</div>
        <div class="prize-name">RaRa Ramen</div>
      </div>

      <!-- 3: Mystery -->
      <div class="prize" id="p3">
        <div class="mystery-box">❓</div>
        <div class="prize-name">Mystery Prize</div>
      </div>

      <!-- 4: Staredown Rematch -->
      <div class="prize" id="p4">
        <div class="stare">
          <div class="eye"><div class="iris"><div class="pupil"></div></div></div>
          <div class="eye"><div class="iris"><div class="pupil"></div></div></div>
        </div>
        <div class="prize-name">Staredown Rematch</div>
      </div>

    </div><!-- /prize-row -->
  </div><!-- /glass -->
</div><!-- /machine -->
</div><!-- /machine-wrap -->

<!-- Controls -->
<div class="controls">
  <div class="timer" id="timer">0:30</div>
  <button class="drop-btn" id="dropBtn" onclick="dropClaw()" disabled>DROP</button>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let clawPct   = 50;
let dropping  = false;
let gameOn    = false;
let timeLeft  = 30;
let countdown = null;
let gyroLive  = false;

const PRIZES = [
  { id:'p0', icon:'🧊', name:'Magnetic Speed Rubik\'s Cube with Lube', mystery:false },
  { id:'p1', icon:'🎫', name:'Banksy Tickets',   mystery:false },
  { id:'p2', icon:'🍜', name:'RaRaRamen',        mystery:false },
  { id:'p3', icon:'❓', name:'Mystery Prize',    mystery:true  },
  { id:'p4', icon:'👁️', name:'Staredown Rematch',mystery:false },
];

// ============================================================
// ELEMENTS
// ============================================================
const clawAssy  = document.getElementById('clawAssy');
const railCart  = document.getElementById('railCart');
const wire      = document.getElementById('wire');
const clawHead  = document.getElementById('clawHead');
const heldPrize = document.getElementById('heldPrize');
const glass     = document.getElementById('glass');
const timerEl   = document.getElementById('timer');
const dropBtn   = document.getElementById('dropBtn');

// ============================================================
// POSITION HELPERS
// ============================================================
function setPos(pct) {
  clawPct = Math.max(8, Math.min(92, pct));
  clawAssy.style.left = clawPct + '%';
  railCart.style.left = clawPct + '%';
}

function enterGyroMode() {
  if (gyroLive) return;
  gyroLive = true;
  clawAssy.classList.remove('idle');
  clawAssy.style.animation = 'none';
  railCart.classList.remove('idle');
  railCart.style.animation = 'none';
}

// ============================================================
// START
// ============================================================
function startGame() {
  document.getElementById('startOverlay').style.display = 'none';
  gameOn = true;
  dropBtn.disabled = false;

  // iOS 13+ permission
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === 'granted') listenGyro(); })
      .catch(() => {});
  } else {
    listenGyro();
  }

  // Touch / mouse fallback for desktop
  glass.addEventListener('pointermove', onPointer);

  startCountdown();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchend', e => {
  e.preventDefault();
  startGame();
});

// ============================================================
// GYROSCOPE
// ============================================================
function listenGyro() {
  window.addEventListener('deviceorientation', onGyro, true);
}

function onGyro(e) {
  if (!gameOn || dropping) return;
  const g = e.gamma;
  if (g == null) return;
  enterGyroMode();
  // gamma: -90 (tilt left) to +90 (tilt right)
  // comfortable range: -50 to +50
  const mapped = ((Math.max(-50, Math.min(50, g)) + 50) / 100) * 84 + 8;
  setPos(mapped);
}

function onPointer(e) {
  if (!gameOn || dropping || gyroLive) return;
  const r = glass.getBoundingClientRect();
  setPos(((e.clientX - r.left) / r.width) * 100);
  enterGyroMode();
}

// ============================================================
// TIMER
// ============================================================
function startCountdown() {
  timeLeft = 30;
  renderTimer();
  countdown = setInterval(() => {
    timeLeft--;
    renderTimer();
    if (timeLeft <= 5) timerEl.classList.add('urgent');
    if (timeLeft <= 0) {
      clearInterval(countdown);
      if (!dropping) dropClaw();
    }
  }, 1000);
}

function renderTimer() {
  timerEl.textContent = '0:' + String(timeLeft).padStart(2, '0');
}

// ============================================================
// DROP
// ============================================================
function dropClaw() {
  if (dropping || !gameOn) return;
  dropping = true;
  dropBtn.disabled = true;
  clearInterval(countdown);
  timerEl.textContent = '';
  timerEl.classList.remove('urgent');

  // Freeze position
  clawAssy.classList.remove('idle');
  clawAssy.style.animation = 'none';
  railCart.classList.remove('idle');
  railCart.style.animation = 'none';
  clawAssy.style.left = clawPct + '%';
  railCart.style.left = clawPct + '%';

  // Find nearest prize
  const prizeEls = Array.from(document.querySelectorAll('.prize'));
  const clawR = clawAssy.getBoundingClientRect();
  const clawCX = clawR.left + clawR.width / 2;

  let nearIdx = 0, nearDist = Infinity;
  prizeEls.forEach((el, i) => {
    const r = el.getBoundingClientRect();
    const d = Math.abs(clawCX - (r.left + r.width / 2));
    if (d < nearDist) { nearDist = d; nearIdx = i; }
  });

  // Open mystery URL now (still within user gesture call stack)
  if (PRIZES[nearIdx].mystery) {
    window.open('https://youtu.be/Aq5WXmQQooo?si=y6cVUeT25OzcfSiZ', '_blank');
  }

  const targetH = glass.offsetHeight - 112;
  animateDrop(72, targetH, nearIdx);
}

function animateDrop(h, target, idx) {
  h = Math.min(h + 5, target);
  wire.style.height = h + 'px';
  if (h < target) {
    requestAnimationFrame(() => animateDrop(h, target, idx));
  } else {
    clawHead.classList.add('grabbing');
    setTimeout(() => retractClaw(h, idx), 380);
  }
}

function retractClaw(h, idx) {
  // Show held prize icon while retracting
  heldPrize.textContent = PRIZES[idx].icon || '🎁';
  heldPrize.style.display = 'block';

  function step(h) {
    h = Math.max(h - 7, 72);
    wire.style.height = h + 'px';
    if (h > 72) {
      requestAnimationFrame(() => step(h));
    } else {
      setTimeout(() => showWin(idx), 180);
    }
  }
  step(h);
}

// ============================================================
// WIN
// ============================================================
function showWin(idx) {
  const p = PRIZES[idx];
  const el = document.getElementById(p.id);
  el.style.transform = 'scale(0) translateY(-80px)';
  el.style.opacity = '0';

  spawnConfetti();

  setTimeout(() => {
    document.getElementById('winIcon').textContent = p.mystery ? '🎁' : (p.icon || '🏆');
    document.getElementById('winSub').textContent = p.mystery
      ? 'You found the Mystery Prize!\nOpening in a new tab...'
      : 'You won:\n' + p.name;

    if (p.mystery) {
      document.getElementById('mysteryLink').style.display = 'block';
    }

    document.getElementById('winScreen').classList.add('show');
  }, 520);
}

// ============================================================
// CONFETTI
// ============================================================
const CFT_COLORS = ['#f8c0cc','#e88898','#f0d090','#c8d8f0','#d4b8e0','#f0f0b8'];
function spawnConfetti() {
  for (let i = 0; i < 44; i++) {
    const el = document.createElement('div');
    el.className = 'cft';
    const w = 6 + Math.random() * 8;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      top:-12px;
      width:${w}px;
      height:${w * (.6 + Math.random()*.8)}px;
      background:${CFT_COLORS[Math.floor(Math.random()*CFT_COLORS.length)]};
      animation-duration:${1.6 + Math.random()*2.2}s;
      animation-delay:${Math.random()*.55}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ============================================================
// RESET
// ============================================================
function resetGame() {
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('mysteryLink').style.display = 'none';

  document.querySelectorAll('.prize').forEach(el => {
    el.style.transform = '';
    el.style.opacity = '';
  });

  wire.style.height = '72px';
  heldPrize.style.display = 'none';
  heldPrize.textContent = '';
  clawHead.classList.remove('grabbing');

  clawPct = 50;
  clawAssy.style.left = '';
  clawAssy.style.animation = '';
  clawAssy.classList.add('idle');
  railCart.style.left = '';
  railCart.style.animation = '';
  railCart.classList.add('idle');

  dropping = false;
  gameOn = false;
  gyroLive = false;
  dropBtn.disabled = true;
  timerEl.textContent = '0:30';
  timerEl.classList.remove('urgent');

  document.getElementById('startOverlay').style.display = 'flex';
}

// Init
setPos(50);
</script>
</body>
</html>
